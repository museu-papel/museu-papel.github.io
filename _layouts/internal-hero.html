---
layout: default
---

<div class="internal-page">

  <!-- HERO -->
  <section class="internal-hero-box">
    
    <div class="internal-hero-inner {% if page.hero_align == 'right' %}reverse{% endif %}">

      {% if page.hero_image %}
      <div class="internal-hero-image">
        <img src="{{ page.hero_image }}" alt="">
      </div>
      {% endif %}

      <div class="internal-hero-text">
        <h1>{{ page.title }}</h1>

        {% if page.excerpt %}
          <p class="lead">{{ page.excerpt }}</p>
        {% endif %}
      </div>

    </div>

  </section>

  <!-- CONTEÚDO -->
  <section class="internal-content">
    {{ content }}
  </section>

</div>
